<section class="bb">
  <!-- Nav principale -->
  <nav class="bb__nav" role="navigation">
    <div class="bb__brand">
      <img class="bb__logo" src="./assets/icon-blackbay.png" alt="" />
      <span class="bb__brandText">
        <span class="black">Black</span><span class="bay">Bay</span>
      </span>
    </div>

    <div class="bb__sep" aria-hidden="true"></div>

    <ul class="bb__tabs" id="bb-tabs">
      <li class="bb__tab"><a href="#" data-tab="drogues">Drogues</a></li>
      <li class="bb__tab"><a href="#" data-tab="armes">Armes</a></li>
      <li class="bb__tab"><a href="#" data-tab="marche">Marché</a></li>
    </ul>
  </nav>

  <!-- Sous-nav (raccourcis catégories à gauche, panier à droite) -->
  <nav class="bbSub" role="navigation">
    <ul class="bbSub__left" id="bb-subtabs">
      <li class="bbSub__tab"><a href="#" data-sub="cocaine">Cocaïne</a></li>
      <li class="bbSub__tab"><a href="#" data-sub="meth">Méthamphétamine</a></li>
    </ul>
    <span class="bbSub__cart">Panier <span id="cart-count" class="bbCart__count">0</span></span>
  </nav>

  <!-- Contenu (scrollable) -->
  <div class="bbCart" id="bbCart">
    <div id="bb-empty" class="bbCart__empty">Votre panier est vide.</div>
    <div id="bb-list" class="bbCart__list"></div>
  </div>

  <!-- Résumé / actions -->
  <div class="bbCart__checkout">
    <div class="bbCart__sumline">
      <span id="bb-total-qty">0</span> article(s) — <span id="bb-total-amt">USD $0</span>
    </div>
    <div class="bbCart__buttons">
      <button id="bb-cart-clear" class="btn -ghost" type="button">Vider</button>
      <button id="bb-cart-back" class="btn" type="button">Continuer</button>
    </div>
  </div>
</section>
