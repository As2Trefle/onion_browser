<section class="bb">
  <!-- Header et barre de recherche : tu utilises déjà le même markup sur BlackBay -->
  <header class="bbHeader"></header>
  <div class="omnibox">
    <form id="omnibox" class="omnibox__wrap">
      <img class="omnibox__icon" src="./assets/logo-onion.png" alt="">
      <input id="omnibox-input" class="omnibox__input" placeholder="Rechercher..." />
      <button class="omnibox__go" type="submit">Go</button>
    </form>
  </div>

  <!-- Nav principale BlackBay -->
  <nav class="bbNav">
    <ul id="bb-tabs" class="bb__tabs">
      <li class="bb__tab"><a href="#" data-tab="drogues">Drogues</a></li>
      <li class="bb__tab"><a href="#" data-tab="armes">Armes</a></li>
      <li class="bb__tab"><a href="#" data-tab="marche">Marché</a></li>
    </ul>
  </nav>

  <!-- Nav secondaire (Panier à droite) -->
  <nav class="bbSub">
    <ul id="bb-subtabs" class="bbSub__tabs">
      <li class="bbSub__tab"><a href="#" data-sub="cocaine">Cocaïne</a></li>
      <li class="bbSub__tab"><a href="#" data-sub="meth">Méthamphétamine</a></li>
    </ul>
    <a href="#" class="bbSub__cart" data-sub="cart">Panier</a>
  </nav>

  <!-- Contenu (scrollable) -->
  <main class="bbCart">
    <div id="bb-empty" class="bbCart__empty" style="display:none">Votre panier est vide.</div>
    <div id="bb-list" class="bbCart__list"></div>

    <div class="bbCart__total">
      Total : <span id="bb-total-amt">USD $0</span> — <span id="bb-total-qty">0</span> article(s)
    </div>

    <div class="bbCart__actionsRow">
      <button id="bb-cart-back" class="bbCart__btn">Continuer mes achats</button>
      <button id="bb-cart-clear" class="bbCart__btn bbCart__btn--danger">Vider le panier</button>
    </div>
  </main>

  <footer class="bbFooter"></footer>
</section>
